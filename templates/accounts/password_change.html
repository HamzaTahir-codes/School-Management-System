{% extends 'base.html' %}

{% block title %}Change Password - SchoolOS{% endblock %}

{% block content %}
<div class="flex justify-center min-h-[60vh]">
    <div class="w-full max-w-xl">
        <div class="mb-4">
            <a href="{% url 'accounts:dashboard' %}" class="inline-flex items-center text-sm font-medium text-indigo-600 hover:text-indigo-800 transition-colors">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Back to Dashboard
            </a>
        </div>
        
        <div class="glass-panel p-8 rounded-3xl">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Change Security Preferences</h2>
            
            <form method="post" class="space-y-4">
                {% csrf_token %}
                {{ form.as_p }}
                
                <div class="pt-4 border-t border-white/50">
                    <button type="submit" class="w-full md:w-auto py-2.5 px-6 glass-btn-primary rounded-xl font-medium shadow-md">
                        Update Password
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
