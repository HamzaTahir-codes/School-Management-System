{% extends 'base.html' %}

{% block title %}{{ title }} - SchoolOS{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="glass-card p-8 md:p-10 rounded-3xl relative overflow-hidden text-center">
        <div class="absolute -right-10 -top-10 w-40 h-40 bg-rose-200 rounded-full blur-3xl opacity-40 pointer-events-none"></div>
        <div class="relative z-10">
            <div class="w-16 h-16 rounded-full bg-rose-100 flex items-center justify-center text-rose-500 mx-auto mb-6">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"></path></svg>
            </div>
            <h2 class="text-2xl font-extrabold text-slate-800 mb-2">{{ title }}</h2>
            <p class="text-slate-500 mb-6">You are about to permanently delete <strong class="text-rose-600">{{ name }}</strong>. This action cannot be undone.</p>
            <form method="post">
                {% csrf_token %}
                <div class="flex gap-4 justify-center">
                    <a href="{{ back_url }}" class="flex-1 glass-btn py-3 rounded-xl font-bold text-center">Cancel</a>
                    <button type="submit" class="flex-1 py-3 bg-rose-500 text-white font-bold rounded-xl hover:bg-rose-600 transition shadow-lg active:scale-95">Confirm Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
