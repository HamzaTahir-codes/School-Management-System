{% extends 'partial/base.html' %}
{% load static %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="signup-container">
    <h2>Create an Account</h2>
    
    <form method="post" action="{% url 'school_signup' %}">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="form-group">
                {{ field.label }}
                {{ field }}
                
                {% if field.errors %}
                    <div class="errors">
                        {{ field.errors }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}
        
        <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>
</div>
{% endblock %}
